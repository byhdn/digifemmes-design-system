<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Geometric repeat pattern with brand shapes -->
  <defs>
    <pattern id="geoPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Rounded square — top left -->
      <rect x="8" y="8" width="30" height="30" rx="6" fill="none" stroke="#FF7B00" stroke-width="1.5" opacity="0.2"/>
      <!-- Circle — top right -->
      <circle cx="73" cy="23" r="15" fill="none" stroke="#12B8DF" stroke-width="1.5" opacity="0.18"/>
      <!-- Diamond — bottom left -->
      <polygon points="23,73 38,58 53,73 38,88" fill="none" stroke="#225DA7" stroke-width="1.5" opacity="0.15"/>
      <!-- Triangle — bottom right -->
      <polygon points="73,58 88,88 58,88" fill="none" stroke="#FFC107" stroke-width="1.5" opacity="0.18"/>
      <!-- Center dot -->
      <circle cx="50" cy="50" r="3" fill="#FF7B00" opacity="0.1"/>
      <!-- Connecting lines (subtle grid) -->
      <line x1="38" y1="38" x2="50" y2="50" stroke="#E0E0E0" stroke-width="0.5" opacity="0.3"/>
      <line x1="73" y1="23" x2="50" y2="50" stroke="#E0E0E0" stroke-width="0.5" opacity="0.3"/>
      <line x1="38" y1="73" x2="50" y2="50" stroke="#E0E0E0" stroke-width="0.5" opacity="0.3"/>
      <line x1="73" y1="73" x2="50" y2="50" stroke="#E0E0E0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#FFFFFF"/>
  <rect width="200" height="200" fill="url(#geoPattern)"/>
</svg>
